# Include this inside the existing HTTPS server block for peersunity.com.
# This location must appear before any generic PHP/Laravel fallback location so
# wss://peersunity.com/app/{appKey} is proxied to Laravel Reverb instead of
# being handled as a normal Laravel/static route.
location /app/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
