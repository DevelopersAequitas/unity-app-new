; /etc/supervisor/conf.d/peersunity-reverb.conf
[program:peersunity-reverb]
process_name=%(program_name)s
command=/usr/bin/php /var/www/unity-app-new/artisan reverb:start --host=127.0.0.1 --port=8080 --no-interaction
directory=/var/www/unity-app-new
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/unity-app-new/storage/logs/reverb.log
stopwaitsecs=10
