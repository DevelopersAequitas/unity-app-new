# Include this inside the existing HTTPS server block for peersunity.com.
# These locations must appear before any generic PHP/Laravel fallback location so
# Reverb traffic is proxied to the local Reverb process instead of being handled
# as normal Laravel/static routes.
#
# No trailing slash is used on proxy_pass so Nginx preserves the complete request
# path and query string, e.g. /app/{key}?protocol=... and /apps/{id}/events.
location /app/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_cache_bypass $http_upgrade;
}

# Laravel Reverb uses the Pusher-compatible /apps/* HTTP API for publishing
# events from the Laravel broadcaster when REVERB_HOST points at peersunity.com.
location /apps/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
